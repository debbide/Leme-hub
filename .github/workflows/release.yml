name: Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build:desktop:win
      - uses: actions/upload-artifact@v4
        with:
          name: leme-hub-desktop-windows
          path: dist/desktop/**

  desktop-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build:desktop:deb
      - uses: actions/upload-artifact@v4
        with:
          name: leme-hub-desktop-deb
          path: dist/desktop/**

  server-linux-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build:server
      - uses: actions/upload-artifact@v4
        with:
          name: leme-hub-server-linux
          path: dist/server/**
