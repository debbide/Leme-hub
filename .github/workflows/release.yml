name: Release Builds

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to publish/update (for example v0.1.16)
        required: false
        type: string
      release_version:
        description: Optional package version override (defaults to release_tag without leading v)
        required: false
        type: string
  push:
    tags:
      - 'v*'

jobs:
  desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync package version from tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG_INPUT="${{ github.event.inputs.release_tag || '' }}"
            VERSION_INPUT="${{ github.event.inputs.release_version || '' }}"
            VERSION="${VERSION_INPUT:-${TAG_INPUT#v}}"
            if [[ -n "$VERSION" ]]; then
              npm version --no-git-tag-version "$VERSION"
            else
              echo "Manual branch build: keeping package.json version"
            fi
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"
          else
            echo "Manual branch build: keeping package.json version"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build:desktop:win
      - name: Collect Windows release files
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release-assets/windows | Out-Null
          $files = Get-ChildItem -Path dist/desktop -File | Where-Object { $_.Extension -eq '.exe' }
          if (-not $files) {
            Write-Error 'No Windows desktop artifacts were found in dist/desktop'
          }
          $files | Copy-Item -Destination release-assets/windows -Force
      - uses: actions/upload-artifact@v4
        with:
          name: leme-hub-desktop-windows
          path: release-assets/windows/*
          if-no-files-found: error

  desktop-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync package version from tag
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG_INPUT="${{ github.event.inputs.release_tag || '' }}"
            VERSION_INPUT="${{ github.event.inputs.release_version || '' }}"
            VERSION="${VERSION_INPUT:-${TAG_INPUT#v}}"
            if [[ -n "$VERSION" ]]; then
              npm version --no-git-tag-version "$VERSION"
            else
              echo "Manual branch build: keeping package.json version"
            fi
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"
          else
            echo "Manual branch build: keeping package.json version"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build:desktop:deb
      - name: Collect Linux deb release files
        run: |
          mkdir -p release-assets/linux-desktop
          find dist/desktop -maxdepth 1 -type f -name '*.deb' -exec cp {} release-assets/linux-desktop/ \;
      - uses: actions/upload-artifact@v4
        with:
          name: leme-hub-desktop-deb
          path: release-assets/linux-desktop/*
          if-no-files-found: error

  server-linux-binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync package version from tag
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG_INPUT="${{ github.event.inputs.release_tag || '' }}"
            VERSION_INPUT="${{ github.event.inputs.release_version || '' }}"
            VERSION="${VERSION_INPUT:-${TAG_INPUT#v}}"
            if [[ -n "$VERSION" ]]; then
              npm version --no-git-tag-version "$VERSION"
            else
              echo "Manual branch build: keeping package.json version"
            fi
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"
          else
            echo "Manual branch build: keeping package.json version"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build:server
      - name: Collect Linux server binaries
        run: |
          mkdir -p release-assets/server
          find dist/server -maxdepth 1 -type f ! -name '*.cjs' | while read -r file; do
            name="$(basename "$file")"
            case "$name" in
              *arm64)
                cp "$file" "release-assets/server/leme-hub-server-linux-arm64"
                ;;
              *x64)
                cp "$file" "release-assets/server/leme-hub-server-linux-amd64"
                ;;
            esac
          done
      - uses: actions/upload-artifact@v4
        with:
          name: leme-hub-server-linux
          path: release-assets/server/*
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    needs:
      - desktop-windows
      - desktop-linux-deb
      - server-linux-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "RELEASE_TAG=${{ github.event.inputs.release_tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: leme-hub-desktop-windows
          path: release-assets/windows

      - name: Download Linux deb artifacts
        uses: actions/download-artifact@v4
        with:
          name: leme-hub-desktop-deb
          path: release-assets/linux-desktop

      - name: Download server binary artifacts
        uses: actions/download-artifact@v4
        with:
          name: leme-hub-server-linux
          path: release-assets/server

      - name: Remove old uploaded release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | while read -r asset; do
            if [[ -n "$asset" ]]; then
              gh release delete-asset "$RELEASE_TAG" "$asset" -y || true
            fi
          done

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            release-assets/windows/**
            release-assets/linux-desktop/**
            release-assets/server/**
          generate_release_notes: true
          overwrite_files: true
